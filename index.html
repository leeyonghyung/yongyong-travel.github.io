<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F5F0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="여행 회화">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>여행 회화 도우미</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --border: #E8E4DC;
    --text: #1A1816;
    --muted: #7A7570;
    --accent-cn: #D4332A;
    --accent-jp: #D0284A;
    --accent-us: #1A4FA0;
    --chip-hover: #EDEAE3;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 6px 24px rgba(0,0,0,0.11);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 48px;
  }

  .app-header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .app-logo-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(135deg, #1A4FA0, #D4332A);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; flex-shrink: 0;
  }
  .app-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .app-subtitle { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .country-tabs {
    display: flex; gap: 8px; padding: 16px 20px 0;
    overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .country-tabs::-webkit-scrollbar { display: none; }

  .country-tab {
    flex-shrink: 0; display: flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: 50px;
    border: 1.5px solid var(--border); background: var(--card);
    cursor: pointer; font-size: 14px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.18s; white-space: nowrap;
  }
  .country-tab .flag { font-size: 19px; }
  .country-tab:hover { background: var(--chip-hover); }
  .country-tab.active-cn { border-color: var(--accent-cn); background: #FFF0EF; color: var(--accent-cn); }
  .country-tab.active-jp { border-color: var(--accent-jp); background: #FFF0F2; color: var(--accent-jp); }
  .country-tab.active-us { border-color: var(--accent-us); background: #EEF3FF; color: var(--accent-us); }

  .main { padding: 16px 20px; max-width: 780px; margin: 0 auto; }

  .hero-card {
    background: var(--card); border-radius: var(--radius);
    padding: 20px 22px; margin-bottom: 16px;
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
  }
  .hero-flag { font-size: 36px; flex-shrink: 0; }
  .hero-country-name { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
  .hero-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.7px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  .situation-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 20px;
  }
  @media (min-width: 480px) { .situation-grid { grid-template-columns: repeat(6, 1fr); } }

  .situation-chip {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 11px 8px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--card);
    cursor: pointer; font-size: 12px; font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.18s; text-align: center; line-height: 1.3;
  }
  .situation-chip .icon { font-size: 20px; }
  .situation-chip:hover { background: var(--chip-hover); transform: translateY(-1px); }
  .situation-chip.active { border-width: 2px; font-weight: 600; }
  .cn .situation-chip.active { border-color: var(--accent-cn); color: var(--accent-cn); background: #FFF5F5; }
  .jp .situation-chip.active { border-color: var(--accent-jp); color: var(--accent-jp); background: #FFF3F5; }
  .us .situation-chip.active { border-color: var(--accent-us); color: var(--accent-us); background: #F0F4FF; }

  .phrase-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .phrase-count { font-size: 12px; color: var(--muted); }

  .phrase-container {
    display: grid; grid-template-columns: 1fr; gap: 10px;
  }
  @media (min-width: 560px) { .phrase-container { grid-template-columns: 1fr 1fr; } }

  .phrase-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px 17px;
    padding-right: 78px; position: relative; overflow: hidden;
    transition: all 0.18s; cursor: default;
  }
  .phrase-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .cn .phrase-card::before { background: var(--accent-cn); }
  .jp .phrase-card::before { background: var(--accent-jp); }
  .us .phrase-card::before { background: var(--accent-us); }
  .phrase-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }

  .phrase-ko { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
  .phrase-foreign { font-size: 18px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; }
  .phrase-foreign.cn-text { font-family: 'Noto Sans SC', sans-serif; }
  .phrase-foreign.jp-text { font-family: 'Noto Sans JP', sans-serif; }
  .phrase-pronun { font-size: 12px; color: var(--muted); font-style: italic; }

  .card-actions {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 5px; align-items: center;
    opacity: 0; transition: opacity 0.18s;
  }
  .phrase-card:hover .card-actions { opacity: 1; }

  .action-btn {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 13px; transition: all 0.15s; flex-shrink: 0;
  }
  .action-btn:hover { background: var(--card); box-shadow: var(--shadow); transform: scale(1.12); }
  .action-btn.speaking { animation: pulse-ring 1s infinite; }
  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(0,0,0,0.15); }
    70%  { box-shadow: 0 0 0 5px rgba(0,0,0,0); }
    100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1A1816; color: white;
    padding: 10px 20px; border-radius: 50px;
    font-size: 13px; font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999; pointer-events: none; font-family: 'Noto Sans KR', sans-serif;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo-icon">✈️</div>
  <div>
    <div class="app-title">여행 회화 도우미</div>
    <div class="app-subtitle">중국 · 일본 · 미국</div>
  </div>
</header>

<nav class="country-tabs" id="countryTabs">
  <button class="country-tab" data-country="cn" onclick="switchCountry('cn')">
    <span class="flag">🇨🇳</span> 중국어
  </button>

  </button>
  <button class="country-tab" data-country="us" onclick="switchCountry('us')">

</nav>

<main class="main" id="mainContent"></main>
<div class="toast" id="toast">📋 복사됨</div>

let currentCountry = 'cn';
let currentSituation = 'airport';
let currentUtterance = null;
const LANG_CODES = { cn: 'zh-CN', jp: 'ja-JP', us: 'en-US' };

function switchCountry(country) {
  currentCountry = country;
  currentSituation = 'airport';
  document.querySelectorAll('.country-tab').forEach(t => {
    t.className = 'country-tab';
    if (t.dataset.country === country) t.classList.add('active-' + country);
  });
  renderMain();
}

function switchSituation(sit) {
  currentSituation = sit;
  document.querySelectorAll('.situation-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.sit === sit)
  );
  renderPhrases();
}

function renderMain() {
  const d = DATA[currentCountry];
  const chipsHtml = d.situations.map(s =>
    `<button class="situation-chip ${s.id === currentSituation ? 'active' : ''}"
      data-sit="${s.id}" onclick="switchSituation('${s.id}')">
      <span class="icon">${s.icon}</span>${s.label}
    </button>`
  ).join('');

  document.getElementById('mainContent').className = `main ${d.cls}`;
  document.getElementById('mainContent').innerHTML = `
    <div class="hero-card">
      <div class="hero-flag">${d.flag}</div>
      <div>
        <div class="hero-country-name">${d.name} 여행 회화</div>
        <div class="hero-desc">${d.desc}</div>
      </div>
    </div>
    <div class="section-label">상황 선택</div>
    <div class="situation-grid">${chipsHtml}</div>
    <div class="phrase-header">
      <div class="section-label" style="margin-bottom:0;">자주 쓰는 표현</div>
      <span id="phraseCount" class="phrase-count"></span>
    </div>
    <div class="phrase-container" id="phraseContainer"></div>
  `;
  renderPhrases();
}

function renderPhrases() {
  const d = DATA[currentCountry];
  const phrases = d.phrases[currentSituation] || [];
  const container = document.getElementById('phraseContainer');
  const countEl = document.getElementById('phraseCount');
  if (!container) return;
  if (countEl) countEl.textContent = `${phrases.length}개`;

  container.innerHTML = phrases.map(p => {
    const safe = p.foreign.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `
    <div class="phrase-card">
      <div class="phrase-ko">${p.ko}</div>
      <div class="phrase-foreign ${d.script}">${p.foreign}</div>
      <div class="phrase-pronun">${p.pronun}</div>
      <div class="card-actions">
        <button class="action-btn" title="발음 듣기"
          onclick="speakPhrase('${safe}', this)">🔊</button>
        <button class="action-btn" title="복사"
          onclick="copyPhrase('${safe}')">📋</button>
      </div>
    </div>`;
  }).join('');
}

function copyPhrase(text) {
  navigator.clipboard.writeText(text).catch(() => {});
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function speakPhrase(text, btn) {
  if (!('speechSynthesis' in window)) { alert('이 브라우저는 음성 재생을 지원하지 않습니다.'); return; }
  if (currentUtterance) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.action-btn.speaking')
      .forEach(b => { b.classList.remove('speaking'); b.textContent = '🔊'; b._active = false; });
    if (btn && btn._active) { currentUtterance = null; return; }
  }
  const lang = LANG_CODES[currentCountry] || 'zh-CN';
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = lang; utter.rate = 0.85;
  const voices = window.speechSynthesis.getVoices();
  const match = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith(lang.split('-')[0]));
  if (match) utter.voice = match;
  if (btn) { btn.classList.add('speaking'); btn._active = true; btn.textContent = '⏹'; }
  utter.onend = utter.onerror = () => {
    currentUtterance = null;
    if (btn) { btn.classList.remove('speaking'); btn._active = false; btn.textContent = '🔊'; }
  };
  currentUtterance = utter;
  window.speechSynthesis.speak(utter);
}

window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

// shortcut URL 파라미터 처리 (?country=cn/jp/us)
const urlParams = new URLSearchParams(window.location.search);
const paramCountry = urlParams.get('country');
switchCountry(DATA[paramCountry] ? paramCountry : 'cn');
